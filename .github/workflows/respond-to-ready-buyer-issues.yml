name: Respond to ready buyer issues

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to evaluate"
        required: true
        type: string
  issues:
    types: [opened, reopened, edited, labeled]

permissions:
  contents: read
  issues: write

concurrency:
  group: standalone-ready-buyer-response-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  respond:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Respond if this is a real ready buyer issue
        run: ruby scripts/respond_to_ready_buyer_issue.rb
